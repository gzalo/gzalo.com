{{ define "main" }}
<div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold font-mono mb-6">{{ .Title }}</h1>
    
    <div class="mb-8">
        <input 
            type="text" 
            id="search-input" 
            placeholder="{{ if eq .Lang "es" }}Escribí para buscar...{{ else }}Type to search...{{ end }}"
            class="w-full p-4 text-lg border-2 border-gray-300 rounded-lg focus:border-orange-400 focus:outline-none"
            autofocus
        >
    </div>
    
    <div id="search-results" class="space-y-4 mt-4"></div>
</div>

<script src="https://unpkg.com/lunr/lunr.js"></script>
<script>
(function() {
    const currentLang = '{{ .Lang }}';
    let idx = null;
    let documents = [];
    
    // Fetch the search index
    fetch('/index.json')
        .then(response => response.json())
        .then(data => {
            // Filter documents by current language
            documents = data.filter(doc => doc.lang === currentLang);
            
            console.log("Loaded " + documents.length + " documents for language: " + currentLang);

            // Build the Lunr index
            idx = lunr(function() {
                this.ref('href');
                this.field('title', { boost: 10 });
                this.field('summary', { boost: 5 });
                this.field('content');
                
                documents.forEach(doc => {
                    this.add(doc);
                });
            });
        })
        .catch(err => {
            console.error('Error loading search index:', err);
        });
    
    const searchInput = document.getElementById('search-input');
    const resultsContainer = document.getElementById('search-results');
    
    // Debounce function
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(this, args), wait);
        };
    }
    
    // Get section color classes
    function getSectionStyles(section) {
        switch(section) {
            case 'calculators': return 'border-b-sky-400';
            case 'articles': return 'border-b-red-500';
            case 'projects': return 'border-b-orange-400';
            case 'experiments': return 'border-b-emerald-500';
            default: return 'border-b-black';
        }
    }
    
    // Perform search
    function performSearch(query) {
        if (!idx || query.length < 2) {
            resultsContainer.innerHTML = '';
            return;
        }
        
        try {
            // Search with wildcard for partial matches
            const results = idx.search(query + '*');
            
            if (results.length === 0) {
                resultsContainer.innerHTML = `
                    <p class="text-gray-500 text-center py-8">
                        {{ if eq .Lang "es" }}No se encontraron resultados para "{{ else }}No results found for "{{ end }}<strong>${escapeHtml(query)}</strong>"
                    </p>`;
                return;
            }
            
            const html = results.slice(0, 20).map(result => {
                const doc = documents.find(d => d.href === result.ref);
                if (!doc) return '';
                
                const borderColor = getSectionStyles(doc.section);
                
                return `
                    <a href="${doc.href}" class="block">
                        <div class="border ${borderColor} border-b-3 border-gray-400 p-4 hover:bg-gray-50 transition-colors">
                            <h3 class="font-mono font-bold text-lg">${escapeHtml(doc.title)}</h3>
                            <p class="text-gray-600 mt-2">${escapeHtml(doc.summary || '')}</p>
                        </div>
                    </a>
                `;
            }).join('');
            
            resultsContainer.innerHTML = html;
        } catch (e) {
            // Handle Lunr parsing errors gracefully
            resultsContainer.innerHTML = '';
        }
    }
    
    // Escape HTML to prevent XSS
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    // Add event listener with debounce
    searchInput.addEventListener('input', debounce(function(e) {
        performSearch(e.target.value.trim());
    }, 200));
    
    // Check for query parameter
    const urlParams = new URLSearchParams(window.location.search);
    const initialQuery = urlParams.get('q');
    if (initialQuery) {
        searchInput.value = initialQuery;
        // Wait for index to load, then search
        const checkAndSearch = setInterval(() => {
            if (idx) {
                performSearch(initialQuery);
                clearInterval(checkAndSearch);
            }
        }, 100);
    }
})();
</script>
{{ end }}
